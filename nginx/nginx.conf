# =============================================================================
# IMPORTANT: Before using this file, replace every occurrence of YOUR_DOMAIN
# with your actual domain name (e.g. example.com). There are multiple
# occurrences across this file — in server_name directives and SSL certificate
# paths. A quick search-and-replace is the easiest approach.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    upstream api_service {
        server api:3001;
    }

    upstream web_service {
        server web:3000;
    }

    # --------------------------------------------------------------------------
    # Server 1 — HTTP (port 80)
    # Handles ACME challenge requests for Let's Encrypt certificate renewal and
    # redirects all other traffic to HTTPS.
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Serve Let's Encrypt ACME challenge files for certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # Server 2 — HTTPS (port 443)
    # Terminates SSL and proxies requests to the api or web upstream services.
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        # SSL certificate paths (managed by certbot)
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Only allow modern, secure TLS protocol versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suite — prefers forward-secrecy and AEAD ciphers
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- API proxy ---
        # Requests to /api/ are forwarded to the Node.js API service
        location /api/ {
            proxy_pass         http://api_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Web proxy ---
        # All other requests are forwarded to the Next.js web service
        location / {
            proxy_pass         http://web_service;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
