name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-ci:
    name: Web CI (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  api-ci:
    name: API CI (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api

    # 1. Spin up a temporary PostgreSQL database container for testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: finance_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:changeme@localhost:5432/finance_tracker_test
      JWT_SECRET: test_jwt_secret_string
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_string
      BCRYPT_ROUNDS: "10"
      PORT: "3001"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/api/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # 2. Apply database migrations to the temporary Postgres database
      - name: Apply Database Migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      # 3. Run the End-to-End tests against the real (but temporary) database
      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Build
        run: npm run build
