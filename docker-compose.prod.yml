services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-finflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-finflow}
      - NODE_ENV=production
      - PORT=3001
      - BCRYPT_ROUNDS=12
      - JWT_SECRET
      - JWT_REFRESH_SECRET
      - FRONTEND_URL=https://finflow.samuelrods.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finflow-api.rule=Host(`finflow.samuelrods.com`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.finflow-api.entrypoints=websecure"
      - "traefik.http.routers.finflow-api.tls=true"
      - "traefik.http.services.finflow-api.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://finflow.samuelrods.com/api/v1
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://finflow.samuelrods.com/api/v1
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.finflow-web.rule=Host(`finflow.samuelrods.com`)"
      - "traefik.http.routers.finflow-web.entrypoints=websecure"
      - "traefik.http.routers.finflow-web.tls=true"
      - "traefik.http.routers.finflow-web.priority=1"
      - "traefik.http.services.finflow-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
